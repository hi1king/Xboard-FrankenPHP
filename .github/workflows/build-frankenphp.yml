name: 🚀 Build & Push FrankenPHP Image

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/build-frankenphp.yml'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: '上游分支或 Tag（留空则自动检测最新 Release）'
        required: false
        default: ''
      force_rebuild:
        description: '强制重新构建（忽略缓存）'
        type: boolean
        default: false

env:
  UPSTREAM_REPO: cedar2025/Xboard
  UPSTREAM_BRANCH: master
  IMAGE_NAME: xboard-frankenphp

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — 检查上游是否有新提交
  # ════════════════════════════════════════════════════════════════
  check-upstream:
    name: 🔍 Check Upstream Updates
    runs-on: ubuntu-latest
    outputs:
      upstream_sha:   ${{ steps.upstream.outputs.sha }}
      upstream_tag:   ${{ steps.upstream.outputs.tag }}
      version_label:  ${{ steps.upstream.outputs.version_label }}
      should_build:   ${{ steps.compare.outputs.should_build }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Fetch upstream latest info
        id: upstream
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO:   ${{ env.UPSTREAM_REPO }}
          UPSTREAM_BRANCH: ${{ env.UPSTREAM_BRANCH }}
        run: |
          set -euo pipefail

          # 安全调用 gh api：404 时 gh 仍返回 exit 0 且输出 JSON 错误体，需过滤
          safe_gh() {
            local out
            out=$(gh api "$1" --jq "$2" 2>/dev/null) || { printf ''; return 0; }
            case "$out" in
              "{"*) printf '' ;;   # JSON 错误体 → 返回空
              *)    printf '%s' "$out" ;;
            esac
          }

          # 验证 40 位 hex SHA
          is_sha() { printf '%s' "$1" | grep -qE '^[0-9a-f]{40}$'; }

          INPUT_REF="${{ github.event.inputs.upstream_ref }}"
          TAG=""
          SHA=""
          VERSION_LABEL=""

          # ── 1. 确定目标 Tag ─────────────────────────────────────────────
          if [ -z "$INPUT_REF" ]; then
            echo "🔍 Querying latest release for ${UPSTREAM_REPO} ..."
            TAG=$(safe_gh "repos/${UPSTREAM_REPO}/releases/latest" ".tag_name")
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "⚠️  No release found, will use branch HEAD."
              TAG=""
            else
              echo "✅ Latest release tag: ${TAG}"
            fi
          else
            TAG="$INPUT_REF"
            echo "📌 Using user-supplied ref: ${TAG}"
          fi

          # ── 2. 解析 commit SHA ──────────────────────────────────────────
          if [ -n "$TAG" ]; then
            REF_SHA=$(safe_gh "repos/${UPSTREAM_REPO}/git/ref/tags/${TAG}" ".object.sha")

            # git/ref 失败时用 commits API 兜底（部分 lightweight tag）
            if ! is_sha "$REF_SHA"; then
              echo "⚠️  git/ref/tags failed, retrying via commits API ..."
              REF_SHA=$(safe_gh "repos/${UPSTREAM_REPO}/commits/${TAG}" ".sha")
            fi

            if ! is_sha "$REF_SHA"; then
              echo "❌ Cannot resolve SHA for tag: ${TAG}"
              exit 1
            fi

            # annotated tag 需再解一层
            OBJ_TYPE=$(safe_gh "repos/${UPSTREAM_REPO}/git/tags/${REF_SHA}" ".object.type")
            if [ "$OBJ_TYPE" = "commit" ]; then
              COMMIT_SHA=$(safe_gh "repos/${UPSTREAM_REPO}/git/tags/${REF_SHA}" ".object.sha")
              if is_sha "$COMMIT_SHA"; then SHA="$COMMIT_SHA"; else SHA="$REF_SHA"; fi
            else
              SHA="$REF_SHA"
            fi
            VERSION_LABEL="$TAG"

          else
            echo "🔍 Fetching HEAD of branch: ${UPSTREAM_BRANCH} ..."
            SHA=$(safe_gh "repos/${UPSTREAM_REPO}/commits/${UPSTREAM_BRANCH}" ".sha")
            if ! is_sha "$SHA"; then
              echo "❌ Cannot fetch HEAD SHA for branch: ${UPSTREAM_BRANCH}"
              exit 1
            fi
            SHORT_SHA="${SHA:0:7}"
            VERSION_LABEL="${UPSTREAM_BRANCH}-${SHORT_SHA}"
          fi

          echo "📌 SHA: ${SHA}  |  Label: ${VERSION_LABEL}"

          # ── 3. 写入 GITHUB_OUTPUT ───────────────────────────────────────
          printf 'sha=%s\n'           "$SHA"           >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n'           "$TAG"           >> "$GITHUB_OUTPUT"
          printf 'version_label=%s\n' "$VERSION_LABEL" >> "$GITHUB_OUTPUT"

      - name: Compare with last built SHA
        id: compare
        run: |
          LAST_SHA=""
          [ -f .last_built_sha ] && LAST_SHA=$(cat .last_built_sha)

          FORCE="${{ github.event.inputs.force_rebuild }}"
          CURRENT="${{ steps.upstream.outputs.sha }}"

          if [ "$FORCE" = "true" ] || [ "$CURRENT" != "$LAST_SHA" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "✅ Build required"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  No upstream changes, skipping build"
          fi

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — 构建 FrankenPHP Docker 镜像（多架构并行）
  # ════════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build FrankenPHP Image (${{ matrix.platform }})
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Clone upstream ──────────────────────────────────────────────
      - name: Clone upstream Xboard
        run: |
          set -euo pipefail
          SHA="${{ needs.check-upstream.outputs.upstream_sha }}"
          TAG="${{ needs.check-upstream.outputs.upstream_tag }}"

          if [ -n "$TAG" ]; then
            git clone --depth 1 --branch "$TAG" \
              "https://github.com/${{ env.UPSTREAM_REPO }}.git" upstream
          else
            git clone "https://github.com/${{ env.UPSTREAM_REPO }}.git" upstream
            git -C upstream checkout "$SHA"
          fi

          echo "✅ Cloned at SHA: $SHA"
          ls -la upstream/

      # ── 组装 build-context：upstream 源码 + 自包含 Dockerfile ─────────
      # Dockerfile 已通过 RUN heredoc 内联所有配置，无需额外文件
      - name: Assemble build context
        run: |
          set -euo pipefail
          [ -d upstream ] || { echo "❌ upstream dir missing"; exit 1; }

          mkdir -p build-context
          cp -a upstream/. build-context/

          # 用自包含 Dockerfile 覆盖 upstream 原有的
          cp Dockerfile build-context/Dockerfile

          echo "✅ Build context ready ($(find build-context -type f | wc -l) files)"


      # ── Login ───────────────────────────────────────────────────────
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 手动拼装 tags/labels（绕开 metadata-action 的空行 bug）────────
      - name: Build image tags and labels
        id: meta
        env:
          DH_USER:       ${{ secrets.DOCKERHUB_USERNAME }}
          OWNER:         ${{ github.repository_owner }}
          IMAGE:         ${{ env.IMAGE_NAME }}
          VERSION:       ${{ needs.check-upstream.outputs.version_label }}
          SHA:           ${{ needs.check-upstream.outputs.upstream_sha }}
          REF:           ${{ github.ref }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
        run: |
          set -euo pipefail

          GHCR="ghcr.io/${OWNER}/${IMAGE}"
          SHORT="${SHA:0:7}"
          IS_DEFAULT_BRANCH=false
          if [ "$REF" = "refs/heads/main" ] || [ "$REF" = "refs/heads/master" ]; then
            IS_DEFAULT_BRANCH=true
          fi

          # 拼 tags —— 每行一条 image:tag
          {
            echo "${GHCR}:${VERSION}"
            echo "${GHCR}:sha-${SHORT}"
            $IS_DEFAULT_BRANCH && echo "${GHCR}:latest" || true
            if [ -n "$DH_USER" ]; then
              echo "docker.io/${DH_USER}/${IMAGE}:${VERSION}"
              echo "docker.io/${DH_USER}/${IMAGE}:sha-${SHORT}"
              $IS_DEFAULT_BRANCH && echo "docker.io/${DH_USER}/${IMAGE}:latest" || true
            fi
          } > /tmp/tags.txt

          # 拼 labels
          {
            echo "org.opencontainers.image.title=Xboard FrankenPHP"
            echo "org.opencontainers.image.description=High-performance Xboard panel powered by FrankenPHP"
            echo "org.opencontainers.image.source=https://github.com/${UPSTREAM_REPO}"
            echo "upstream.sha=${SHA}"
          } > /tmp/labels.txt

          echo "📦 Tags:"
          cat /tmp/tags.txt

          # 写入多行 GITHUB_OUTPUT（heredoc 格式）
          {
            echo "tags<<__EOF__"
            cat /tmp/tags.txt
            echo "__EOF__"
            echo "labels<<__EOF__"
            cat /tmp/labels.txt
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      # ── Build & Push ────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./build-context
          file:    ./build-context/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.platform }}
          build-args: |
            UPSTREAM_SHA=${{ needs.check-upstream.outputs.upstream_sha }}
            UPSTREAM_VERSION=${{ needs.check-upstream.outputs.version_label }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      # ── 记录本次构建 SHA（仅 amd64 执行一次）───────────────────────
      - name: Save built SHA
        if: matrix.platform == 'linux/amd64'
        run: |
          echo "${{ needs.check-upstream.outputs.upstream_sha }}" > .last_built_sha
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_built_sha
          git diff --staged --quiet || \
            git commit -m "ci: built ${{ needs.check-upstream.outputs.version_label }}"
          git push || true

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — 合并多架构 Manifest
  # ════════════════════════════════════════════════════════════════
  merge-manifests:
    name: 📦 Merge Multi-arch Manifests
    needs: [check-upstream, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          VERSION: ${{ needs.check-upstream.outputs.version_label }}
          BASE:    ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${BASE}:latest" \
            --tag "${BASE}:${VERSION}" \
            "${BASE}:${VERSION}" \
          && echo "✅ Manifest merged" \
          || echo "⚠️  Manifest merge skipped (may already be merged)"

  # ════════════════════════════════════════════════════════════════
  # JOB 4 — Smoke Test
  # ════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Smoke Test
    needs: [check-upstream, build]
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run smoke tests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.version_label }}
        run: |
          set -euo pipefail
          docker pull "$IMAGE"

          echo "── PHP version ──"
          docker run --rm "$IMAGE" php -v

          echo "── Loaded extensions ──"
          docker run --rm "$IMAGE" php -m

          echo "── Quick boot test ──"
          docker run --rm -d --name xboard-smoke -p 8080:80 "$IMAGE" || true
          sleep 5
          curl -fsS http://localhost:8080/health \
            && echo "✅ Health check passed" \
            || echo "⚠️  Health endpoint not ready (normal on first boot)"
          docker stop xboard-smoke 2>/dev/null || true

  # ════════════════════════════════════════════════════════════════
  # JOB 5 — 创建 GitHub Release（仅当上游有 Tag 时）
  # ════════════════════════════════════════════════════════════════
  release:
    name: 🏷️ Create GitHub Release
    needs: [check-upstream, test]
    runs-on: ubuntu-latest
    if: needs.check-upstream.outputs.upstream_tag != ''
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-upstream.outputs.version_label }}-frankenphp
          name: "FrankenPHP Build — ${{ needs.check-upstream.outputs.version_label }}"
          body: |
            ## 🚀 FrankenPHP 构建版本

            | 字段 | 值 |
            |------|-----|
            | 上游版本 | `${{ needs.check-upstream.outputs.upstream_tag }}` |
            | 上游 SHA | `${{ needs.check-upstream.outputs.upstream_sha }}` |
            | 构建时间 | `${{ github.event.repository.updated_at }}` |

            ## 拉取镜像

            ```bash
            # GHCR（推荐）
            docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.version_label }}

            # Latest
            docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ```

            ## 快速启动

            ```bash
            docker run -d \
              --name xboard \
              -p 80:80 -p 443:443 -p 443:443/udp \
              -e APP_KEY=base64:your_key \
              -e DB_HOST=your-db \
              -e DB_DATABASE=xboard \
              -e DB_USERNAME=xboard \
              -e DB_PASSWORD=your_password \
              -e REDIS_HOST=your-redis \
              -v xboard_storage:/app/storage \
              ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ```

            > 基于 [cedar2025/Xboard](https://github.com/${{ env.UPSTREAM_REPO }}) 构建，运行时替换为 FrankenPHP Worker 模式。
          draft: false
          prerelease: false
