name: 🚀 Build & Push FrankenPHP Image

on:
  schedule:
    # 每天凌晨 2:00 UTC 检查上游更新
    - cron: '0 2 * * *'
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/build-frankenphp.yml'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: '上游分支或 Tag（留空则自动检测最新）'
        required: false
        default: ''
      force_rebuild:
        description: '强制重新构建（忽略缓存）'
        type: boolean
        default: false

env:
  UPSTREAM_REPO: cedar2025/Xboard
  UPSTREAM_BRANCH: master
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: xboard-frankenphp

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # JOB 1: 检查上游是否有新提交
  # ──────────────────────────────────────────
  check-upstream:
    name: 🔍 Check Upstream Updates
    runs-on: ubuntu-latest
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      upstream_tag: ${{ steps.upstream.outputs.tag }}
      should_build: ${{ steps.compare.outputs.should_build }}
      version_label: ${{ steps.upstream.outputs.version_label }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Fetch upstream latest info
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
          UPSTREAM_BRANCH: ${{ env.UPSTREAM_BRANCH }}
        run: |
          set -euo pipefail

          # ── 安全调用 gh api，4xx/5xx 或 JSON 错误体时返回空字符串 ──
          safe_gh() {
            local out
            out=$(gh api "$1" --jq "$2" 2>/dev/null) || { echo ""; return 0; }
            # gh api 遇到 404 仍返回 exit 0，输出是 JSON 对象 → 过滤掉
            case "$out" in
              "{"*) echo "" ;;
              *) echo "$out" ;;
            esac
          }

          # ── 验证是否是合法的 40 位 hex SHA ──
          is_sha() { printf '%s' "$1" | grep -qE '^[0-9a-f]{40}$'; }

          REF="${{ github.event.inputs.upstream_ref }}"
          TAG=""
          SHA=""
          VERSION_LABEL=""

          # ── 1. 确定目标 Tag ──────────────────────────────────────────
          if [ -z "$REF" ]; then
            echo "🔍 Querying latest release for $UPSTREAM_REPO ..."
            TAG=$(safe_gh "repos/$UPSTREAM_REPO/releases/latest" ".tag_name")

            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "⚠️  No release found, falling back to branch HEAD."
              TAG=""
            else
              echo "✅ Latest release tag: $TAG"
            fi
          else
            TAG="$REF"
            echo "📌 Using user-supplied ref: $TAG"
          fi

          # ── 2. 解析 commit SHA ───────────────────────────────────────
          if [ -n "$TAG" ]; then
            # 通过 git/ref/tags/<tag> 获取 ref 指向的 sha
            REF_SHA=$(safe_gh "repos/$UPSTREAM_REPO/git/ref/tags/$TAG" ".object.sha")

            # 如果 git/ref 失败（如轻量 tag 不在 git db），用 commits API 兜底
            if ! is_sha "$REF_SHA"; then
              echo "⚠️  git/ref/tags failed, retrying via commits API ..."
              REF_SHA=$(safe_gh "repos/$UPSTREAM_REPO/commits/$TAG" ".sha")
            fi

            if ! is_sha "$REF_SHA"; then
              echo "❌ Cannot resolve SHA for tag: $TAG"
              exit 1
            fi

            # annotated tag：object.type == "tag" 需再解一层
            OBJ_TYPE=$(safe_gh "repos/$UPSTREAM_REPO/git/tags/$REF_SHA" ".object.type")
            if [ "$OBJ_TYPE" = "commit" ]; then
              COMMIT_SHA=$(safe_gh "repos/$UPSTREAM_REPO/git/tags/$REF_SHA" ".object.sha")
              is_sha "$COMMIT_SHA" && SHA="$COMMIT_SHA" || SHA="$REF_SHA"
            else
              SHA="$REF_SHA"   # lightweight tag 或解引用失败，直接用
            fi

            VERSION_LABEL="$TAG"

          else
            # ── 无 Tag → 取分支最新 commit SHA ──────────────────────────
            echo "🔍 Fetching HEAD of branch: $UPSTREAM_BRANCH ..."
            SHA=$(safe_gh "repos/$UPSTREAM_REPO/commits/$UPSTREAM_BRANCH" ".sha")

            if ! is_sha "$SHA"; then
              echo "❌ Cannot fetch HEAD SHA for branch: $UPSTREAM_BRANCH"
              exit 1
            fi

            SHORT_SHA="${SHA:0:7}"
            VERSION_LABEL="${UPSTREAM_BRANCH}-${SHORT_SHA}"
          fi

          echo "📌 SHA: $SHA  |  Label: $VERSION_LABEL"

          # ── 3. 写入 GITHUB_OUTPUT（严格 key=single-line-value 格式）──
          {
            printf 'sha=%s\n'            "$SHA"
            printf 'tag=%s\n'            "$TAG"
            printf 'version_label=%s\n'  "$VERSION_LABEL"
          } >> "$GITHUB_OUTPUT"


      - name: Compare with last built SHA
        id: compare
        run: |
          LAST_SHA=""
          if [ -f .last_built_sha ]; then
            LAST_SHA=$(cat .last_built_sha)
          fi

          FORCE="${{ github.event.inputs.force_rebuild }}"
          CURRENT="${{ steps.upstream.outputs.sha }}"

          if [ "$FORCE" = "true" ] || [ "$CURRENT" != "$LAST_SHA" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "✅ Build required (upstream changed or forced)"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⏭️  Skip build (no upstream changes)"
          fi

  # ──────────────────────────────────────────
  # JOB 2: 构建 FrankenPHP Docker 镜像
  # ──────────────────────────────────────────
  build:
    name: 🐳 Build FrankenPHP Image
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      # ── Clone upstream Xboard ──
      - name: Clone upstream Xboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ needs.check-upstream.outputs.upstream_sha }}"
          TAG="${{ needs.check-upstream.outputs.upstream_tag }}"

          if [ -n "$TAG" ]; then
            git clone --depth 1 --branch "$TAG" \
              https://github.com/${{ env.UPSTREAM_REPO }}.git upstream
          else
            git clone https://github.com/${{ env.UPSTREAM_REPO }}.git upstream
            cd upstream && git checkout "$SHA"
          fi

          echo "✅ Upstream cloned at SHA: $SHA"
          ls upstream/

      # ── 合并自定义 Dockerfile 和配置 ──
      - name: Overlay custom FrankenPHP files
        run: |
          cp Dockerfile upstream/Dockerfile
          cp -r docker/ upstream/docker/ 2>/dev/null || true
          cp -r config/ upstream/config/ 2>/dev/null || true

      # ── 检测 DockerHub 凭据是否已配置 ──────────────────────────────
      # secrets 上下文不能直接用于 with 表达式或裸 if 条件，
      # 需先通过 step env 映射成普通输出变量。
      - name: Detect registry targets
        id: registries
        env:
          _DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$_DH_USER" ]; then
            echo "has_dockerhub=true"  >> $GITHUB_OUTPUT
            echo "dockerhub_image=docker.io/$_DH_USER/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
          else
            echo "has_dockerhub=false" >> $GITHUB_OUTPUT
            echo "dockerhub_image="   >> $GITHUB_OUTPUT
          fi

      # ── Login Registries ──
      - name: Login to Docker Hub
        if: ${{ steps.registries.outputs.has_dockerhub == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Docker Metadata ──
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # dockerhub_image 为空字符串时 metadata-action 会自动忽略该行
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ steps.registries.outputs.dockerhub_image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=${{ needs.check-upstream.outputs.version_label }}
            type=raw,value=${{ needs.check-upstream.outputs.upstream_sha }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Xboard FrankenPHP
            org.opencontainers.image.description=High-performance Xboard panel powered by FrankenPHP
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
            upstream.sha=${{ needs.check-upstream.outputs.upstream_sha }}

      # ── Build & Push ──
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          file: ./upstream/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          build-args: |
            UPSTREAM_SHA=${{ needs.check-upstream.outputs.upstream_sha }}
            UPSTREAM_VERSION=${{ needs.check-upstream.outputs.version_label }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      # ── 保存最新构建 SHA ──
      - name: Save built SHA
        if: matrix.platform == 'linux/amd64'
        run: |
          echo "${{ needs.check-upstream.outputs.upstream_sha }}" > .last_built_sha
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_built_sha
          git diff --staged --quiet || git commit -m "ci: update last built SHA [${{ needs.check-upstream.outputs.version_label }}]"
          git push || true

  # ──────────────────────────────────────────
  # JOB 3: 多架构 Manifest 合并
  # ──────────────────────────────────────────
  merge-manifests:
    name: 📦 Merge Multi-arch Manifests
    needs: [check-upstream, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.check-upstream.outputs.version_label }}"
          BASE="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"

          docker buildx imagetools create \
            --tag "$BASE:latest" \
            --tag "$BASE:$VERSION" \
            "$BASE:$VERSION-linux-amd64" \
            "$BASE:$VERSION-linux-arm64" 2>/dev/null || \
          echo "Manifest merge skipped (single arch or already merged)"

  # ──────────────────────────────────────────
  # JOB 4: 测试镜像
  # ──────────────────────────────────────────
  test:
    name: 🧪 Smoke Test
    needs: [check-upstream, build]
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and test image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.version_label }}"
          docker pull "$IMAGE"

          # 检查 PHP 版本
          docker run --rm "$IMAGE" php -v

          # 检查 FrankenPHP 模块
          docker run --rm "$IMAGE" php -m | grep -E "swoole|openswoole|pdo|redis|mbstring" || true

          # 快速健康检查（5 秒超时）
          docker run --rm -d --name xboard-test -p 8080:80 "$IMAGE" || true
          sleep 3
          curl -sf http://localhost:8080/health || echo "Health endpoint not available (expected for first run)"
          docker stop xboard-test 2>/dev/null || true

  # ──────────────────────────────────────────
  # JOB 5: 发布 Release（仅 tag 触发）
  # ──────────────────────────────────────────
  release:
    name: 🏷️ Create GitHub Release
    needs: [check-upstream, test]
    runs-on: ubuntu-latest
    if: needs.check-upstream.outputs.upstream_tag != ''
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-upstream.outputs.version_label }}-frankenphp
          name: "FrankenPHP Build — ${{ needs.check-upstream.outputs.version_label }}"
          body: |
            ## 🚀 FrankenPHP 构建版本

            | 字段 | 值 |
            |------|-----|
            | 上游版本 | `${{ needs.check-upstream.outputs.upstream_tag }}` |
            | 上游 SHA | `${{ needs.check-upstream.outputs.upstream_sha }}` |
            | 构建时间 | `${{ github.event.repository.updated_at }}` |

            ## Docker 镜像

            ```bash
            # GHCR
            docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.version_label }}

            # Latest
            docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ```

            ## 快速启动

            ```bash
            docker run -d \
              --name xboard \
              -p 80:80 \
              -v ./data:/app/storage \
              -e APP_KEY=your-app-key \
              ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ```

            > 基于 [cedar2025/Xboard](${{ env.UPSTREAM_REPO }}) 上游构建，运行时替换为 FrankenPHP 高性能服务器。
          draft: false
          prerelease: false
