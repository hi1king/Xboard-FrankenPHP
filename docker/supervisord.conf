[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisord]
nodaemon=false
user=root
logfile=/app/storage/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=5
pidfile=/tmp/supervisord.pid
loglevel=info

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

# ── Laravel Queue Worker ──────────────────────────────────────────
[program:queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work %(ENV_QUEUE_CONNECTION)s \
    --queue=%(ENV_QUEUE_NAME)s \
    --sleep=3 \
    --tries=3 \
    --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=%(ENV_QUEUE_WORKERS)s
user=www-data
redirect_stderr=true
stdout_logfile=/app/storage/logs/queue.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=5
environment=QUEUE_CONNECTION="%(ENV_QUEUE_CONNECTION)s"

# ── Laravel Scheduler (runs artisan schedule:run every minute) ────
[program:scheduler]
command=bash -c "while true; do php /app/artisan schedule:run --no-interaction >> /app/storage/logs/scheduler.log 2>&1; sleep 60; done"
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/app/storage/logs/scheduler.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
