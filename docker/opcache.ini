; ── OPcache — FrankenPHP Worker Mode Tuning ──────────────────────
; Worker 模式下 PHP 进程常驻，OPcache 命中率接近 100%

[opcache]
opcache.enable = 1
opcache.enable_cli = 1

; 缓存大小（根据项目体积调整，Xboard 建议 256MB）
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000

; 生产环境关闭文件变更检查（提升性能；更新镜像时会重新加载）
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; JIT（PHP 8+ 数值密集型任务提升明显）
opcache.jit = tracing
opcache.jit_buffer_size = 128M

; 快速关闭
opcache.fast_shutdown = 1

; Preload（可选：预加载 Laravel 核心文件）
; opcache.preload = /app/docker/preload.php
; opcache.preload_user = www-data
